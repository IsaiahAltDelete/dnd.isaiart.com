<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cosmology</title>
    <style>
      /* ------------------------------------------------------------------
         NEO-SWISS UI & LAYOUT
         ------------------------------------------------------------------ */
      :root {
        --bg-color: #050505;
        --panel-bg: rgba(255, 255, 255, 0.03);
        --panel-border: 1px solid rgba(255, 255, 255, 0.1);
        --accent: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.5);
        --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--bg-color);
        font-family: var(--font-main);
        color: var(--accent);
        user-select: none;
      }

      canvas {
        display: block;
        outline: none;
      }

      /* Floating Title - Top Left */
      #titleBlock {
        position: absolute;
        top: 40px;
        left: 40px;
        pointer-events: none;
        z-index: 10;
      }

      h1 {
        font-size: 48px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -1.5px;
        line-height: 0.9;
        text-transform: uppercase;
      }

      h2 {
        font-size: 12px;
        font-weight: 400;
        margin-top: 8px;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* 3D Labels */
      .label {
        color: rgba(255, 255, 255, 0.9);
        font-family: var(--font-main);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        border-radius: 2px;
        backdrop-filter: blur(2px);
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }

      /* Floating Controls - Bottom Left */
      #controlsPanel {
        position: absolute;
        bottom: 40px;
        left: 40px;
        width: 220px;
        background: var(--panel-bg);
        border: var(--panel-border);
        backdrop-filter: blur(20px);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 100;
        transition: opacity 0.3s;
      }

      /* Play Button Area */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      #playPause {
        background: var(--accent);
        color: #000;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
      }

      #playPause:hover {
        transform: scale(1.1);
      }

      .control-group {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }

      /* Swiss Style Range Sliders */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 1px;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 12px;
        width: 12px;
        background: var(--accent);
        border-radius: 0; /* Square thumb for Swiss feel */
        margin-top: -5px;
        cursor: pointer;
        transition: transform 0.1s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      input[type="range"]:focus {
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="titleBlock">
      <h1>The Great<br>Wheel</h1>
      <h2>Cosmology Viewer</h2>
    </div>

    <div id="controlsPanel">
      <div class="header-row">
        <label style="font-size: 12px; color: white;">Simulation</label>
        <button id="playPause">❚❚</button>
      </div>

      <div class="control-group">
        <label>Outer Planes</label>
        <input type="range" id="outerSpeed" min="0" max="0.01" step="0.0001" value="0.002">
      </div>

      <div class="control-group">
        <label>Elemental Chaos</label>
        <input type="range" id="elementalSpeed" min="0" max="0.01" step="0.0001" value="0.003">
      </div>

      <div class="control-group">
        <label>Outlands</label>
        <input type="range" id="outlandsSpeed" min="0" max="0.05" step="0.0001" value="0.02">
      </div>

      <div class="control-group">
        <label>Inner Spheres</label>
        <input type="range" id="innerSpeed" min="0" max="0.05" step="0.0001" value="0.01">
      </div>

      <div class="control-group">
        <label>Sidereal Rotation</label>
        <input type="range" id="starRotation" min="0" max="0.005" step="0.0001" value="0.0005">
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
      // ---------------------------
      // Core Setup
      // ---------------------------
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x050505, 0.0008); // Add depth with fog

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 4000);
      camera.position.set(0, 180, 380);
      
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.outputEncoding = THREE.sRGBEncoding;
      document.body.appendChild(renderer.domElement);
      
      const labelRenderer = new THREE.CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = "absolute";
      labelRenderer.domElement.style.top = "0";
      labelRenderer.domElement.style.pointerEvents = "none";
      document.body.appendChild(labelRenderer.domElement);
      
      // ---------------------------
      // Lighting (Dramatic)
      // ---------------------------
      const ambientLight = new THREE.AmbientLight(0x404040, 1.0);
      scene.add(ambientLight);

      // Sun/Core light
      const pointLight = new THREE.PointLight(0xffffff, 1.5, 1000);
      pointLight.position.set(0, 0, 0);
      scene.add(pointLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(100, 200, 100);
      scene.add(dirLight);
      
      // ---------------------------
      // Controls
      // ---------------------------
      const controls = new THREE.TrackballControls(camera, renderer.domElement);
      controls.rotateSpeed = 3.0;
      controls.zoomSpeed = 1.2;
      controls.panSpeed = 0.8;
      controls.noZoom = false;
      controls.noPan = false;
      controls.staticMoving = false;
      controls.dynamicDampingFactor = 0.2;
      
      let params = {
        outerSpeed: 0.002,
        elementalSpeed: 0.003,
        outlandsSpeed: 0.02,
        innerSpeed: 0.01,
        starRotation: 0.0005,
        playing: true,
      };
      
      // ---------------------------
      // Environment: Stars
      // ---------------------------
      function createStars(count = 3000) {
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const colors = [];
        for (let i = 0; i < count; i++) {
          positions.push(THREE.MathUtils.randFloatSpread(3000), THREE.MathUtils.randFloatSpread(3000), THREE.MathUtils.randFloatSpread(3000));
          const color = new THREE.Color();
          color.setHSL(Math.random(), 0.2, 0.8);
          colors.push(color.r, color.g, color.b);
        }
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
        const material = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8, sizeAttenuation: true });
        return new THREE.Points(geometry, material);
      }
      const starField = createStars();
      scene.add(starField);
      
      // Shooting Stars
      const shootingStars = [];
      const shootingStarGeo = new THREE.SphereGeometry(0.5, 8, 8);
      const shootingStarMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
      
      // Tail effect
      function createTail() {
        const geo = new THREE.BufferGeometry();
        const pos = [0,0,0, 0,0,10];
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        return new THREE.Line(geo, new THREE.LineBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5}));
      }

      for (let i = 0; i < 8; i++) {
        const star = new THREE.Mesh(shootingStarGeo, shootingStarMat);
        const tail = createTail();
        star.add(tail);
        tail.position.z = 0.5;
        resetShootingStar(star);
        shootingStars.push(star);
        scene.add(star);
      }
      function resetShootingStar(star) {
        star.position.set(THREE.MathUtils.randFloatSpread(1200), THREE.MathUtils.randFloat(200, 600), 1200);
        star.userData.velocity = new THREE.Vector3(
          -THREE.MathUtils.randFloat(4, 8),
          -THREE.MathUtils.randFloat(1, 3),
          -THREE.MathUtils.randFloat(4, 8)
        );
        star.lookAt(star.position.clone().add(star.userData.velocity));
      }
      
      // ---------------------------
      // Geometry Helpers
      // ---------------------------
      function createLabeledSphere(name, color, size = 10, roughness = 0.7) {
        const geometry = new THREE.SphereGeometry(size, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: color, 
            roughness: roughness,
            metalness: 0.1,
            emissive: color,
            emissiveIntensity: 0.2
        });
        const sphere = new THREE.Mesh(geometry, material);
        sphere.userData.planeName = name;
        
        const div = document.createElement("div");
        div.className = "label";
        div.textContent = name;
        const label = new THREE.CSS2DObject(div);
        label.position.set(0, size + 4, 0);
        sphere.add(label);
        return sphere;
      }
      
      function addOrbitRing(radius, opacity = 0.15) {
        // Use Torus for a thin physical ring look instead of flat ring
        const geometry = new THREE.TorusGeometry(radius, 0.3, 16, 128);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: opacity 
        });
        const ring = new THREE.Mesh(geometry, material);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
      }

      // ---------------------------
      // Particle Effects (Enhanced)
      // ---------------------------
      // Standard particle material for additive blending (glow effect)
      const glowParticleMat = (color, size=1.5, opacity=0.8) => new THREE.PointsMaterial({ 
          color: color, 
          size: size, 
          transparent: true, 
          opacity: opacity, 
          blending: THREE.AdditiveBlending 
      });

      function createAuraEffect(color) {
        const group = new THREE.Group();
        // Orbital lights
        for (let i = 0; i < 8; i++) {
          const mini = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
          mini.position.set(9 * Math.cos((i/8)*Math.PI*2), Math.sin(i)*2, 9 * Math.sin((i/8)*Math.PI*2));
          group.add(mini);
        }
        return group;
      }
      
      function createSwirlingLightningEffect(color) {
        const group = new THREE.Group();
        const geom = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 100; i++) {
          pos.push((Math.random()-0.5)*22, (Math.random()-0.5)*22, (Math.random()-0.5)*22);
        }
        geom.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
        const pts = new THREE.Points(geom, glowParticleMat(color, 2, 0.6));
        group.add(pts);
        
        // Jagged Lines
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
        for(let k=0; k<3; k++){
            const lineGeom = new THREE.BufferGeometry();
            const linePos = [];
            let x=0, y=0, z=0;
            for (let i = 0; i < 10; i++) {
                x += (Math.random()-0.5)*5;
                y += (Math.random()-0.5)*5;
                z += (Math.random()-0.5)*5;
                linePos.push(x,y,z);
            }
            lineGeom.setAttribute("position", new THREE.Float32BufferAttribute(linePos, 3));
            const line = new THREE.Line(lineGeom, lineMat);
            group.add(line);
        }
        return group;
      }
      
      function createNebulaEffect() {
        const group = new THREE.Group();
        const geom = new THREE.BufferGeometry();
        const count = 200;
        const positions = [];
        const colors = [];
        for (let i = 0; i < count; i++) {
          const r = 10 + Math.random() * 5;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.random() * Math.PI;
          positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
          colors.push(0.8, 0.5 + Math.random()*0.5, 0.8 + Math.random()*0.2);
        }
        geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geom.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
        const pts = new THREE.Points(geom, new THREE.PointsMaterial({ vertexColors: true, size: 1.2, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
        group.add(pts);
        return group;
      }

      // Generic functions for other effects with improved density
      function createVolumeEffect(color, count, spread) {
        const group = new THREE.Group();
        const geom = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < count; i++) {
          pos.push((Math.random()-0.5)*spread, (Math.random()-0.5)*spread, (Math.random()-0.5)*spread);
        }
        geom.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
        const pts = new THREE.Points(geom, glowParticleMat(color, 1.5, 0.6));
        group.add(pts);
        return group;
      }

      function createMechanicalEffect() {
        const group = new THREE.Group();
        const gearGeom = new THREE.TorusGeometry(10, 0.5, 8, 24); // Abstract gear
        const mat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
        const gear1 = new THREE.Mesh(gearGeom, mat);
        const gear2 = new THREE.Mesh(gearGeom, mat);
        gear2.rotation.x = Math.PI/2;
        group.add(gear1);
        group.add(gear2);
        return group;
      }

      function createChaosEffect() {
        const group = createVolumeEffect(0xffffff, 150, 30);
        group.userData.isChaos = true;
        return group;
      }

      function createRingedEffect(color) {
        const group = new THREE.Group();
        for (let i = 1; i <= 3; i++) {
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(i*4, 0.1, 8, 64),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.6 })
            );
            ring.rotation.x = Math.random() * Math.PI;
            ring.rotation.y = Math.random() * Math.PI;
            group.add(ring);
        }
        return group;
      }

      // Map functions
      const effectMapping = {
        "Mount Celestia": (c) => createAuraEffect(c),
        "The Abyss": (c) => createSwirlingLightningEffect(c),
        "Elysium": () => createNebulaEffect(),
        "Hades": () => createVolumeEffect(0xff5500, 100, 22), // Fire
        "Arborea": () => createVolumeEffect(0x22ff44, 80, 20), // Nature
        "Baator": () => createVolumeEffect(0x550000, 100, 25), // Smoke/Dark
        "Mechanus": () => createMechanicalEffect(),
        "Limbo": () => createChaosEffect(),
        "Arcadia": () => createRingedEffect(0xffcc99),
        "Pandemonium": (c) => createSwirlingLightningEffect(0xff00ff),
        "Beastlands": () => createVolumeEffect(0x88cc44, 120, 22),
        "Gehenna": () => createVolumeEffect(0x992200, 100, 24),
        "Bytopia": () => createRingedEffect(0xffddaa),
        "Carceri": () => createVolumeEffect(0x444444, 80, 20) // Shards
      };
      
      // ---------------------------
      // Scene Construction
      // ---------------------------
      
      // 1. Great Wheel (Outer Planes)
      const outerGroup = new THREE.Group();
      const outerOrbitRadius = 160;
      const outerPairs = [
        { positive: { name: "Mount Celestia", color: 0xffdb4d }, negative: { name: "The Abyss", color: 0x4b0082 } },
        { positive: { name: "Elysium", color: 0xffaaff }, negative: { name: "Hades", color: 0x808080 } },
        { positive: { name: "Arborea", color: 0x00ff7f }, negative: { name: "Baator", color: 0x8b0000 } },
        { positive: { name: "Mechanus", color: 0xc0c0c0 }, negative: { name: "Limbo", color: 0x87ceeb } },
        { positive: { name: "Arcadia", color: 0xffe4b5 }, negative: { name: "Pandemonium", color: 0xff1493 } },
        { positive: { name: "Beastlands", color: 0x32cd32 }, negative: { name: "Gehenna", color: 0xa52a2a } },
        { positive: { name: "Bytopia", color: 0xff8c00 }, negative: { name: "Carceri", color: 0x2f4f4f } },
      ];
      
      // Spoke material - faint beams
      const spokeMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.1, transparent: true });

      outerPairs.forEach((pair, i) => {
        const angle = (i / outerPairs.length) * Math.PI * 2;
        
        // Helper to build plane
        const buildPlane = (def, offsetAngle) => {
            const x = outerOrbitRadius * Math.cos(angle + offsetAngle);
            const z = outerOrbitRadius * Math.sin(angle + offsetAngle);
            const sphere = createLabeledSphere(def.name, def.color, 11);
            sphere.position.set(x, 0, z);
            if(effectMapping[def.name]) sphere.add(effectMapping[def.name](def.color));
            outerGroup.add(sphere);

            // Spoke
            const innerPoint = new THREE.Vector3(90 * Math.cos(angle + offsetAngle), 0, 90 * Math.sin(angle + offsetAngle));
            const geo = new THREE.BufferGeometry().setFromPoints([sphere.position, innerPoint]);
            scene.add(new THREE.Line(geo, spokeMaterial));
        };

        buildPlane(pair.positive, 0);
        buildPlane(pair.negative, Math.PI);
      });
      scene.add(outerGroup);
      addOrbitRing(outerOrbitRadius, 0.1);
      
      // 2. Elemental Chaos
      const elementalGroup = new THREE.Group();
      const elementalOrbitRadius = 90;
      const elementalPlanes = [
        { name: "Air", color: 0xaec6cf },
        { name: "Earth", color: 0x8b4513 },
        { name: "Fire", color: 0xff4500 },
        { name: "Water", color: 0x1e90ff },
      ];
      elementalPlanes.forEach((plane, i) => {
        const angle = (i / elementalPlanes.length) * Math.PI * 2;
        const sphere = createLabeledSphere(plane.name, plane.color, 8);
        sphere.position.set(elementalOrbitRadius * Math.cos(angle), 0, elementalOrbitRadius * Math.sin(angle));
        
        // Add specific elemental particles
        const pGroup = createVolumeEffect(plane.color, 40, 15);
        sphere.add(pGroup);
        elementalGroup.add(sphere);
      });
      scene.add(elementalGroup);
      addOrbitRing(elementalOrbitRadius, 0.1);
      
      // 3. Outlands
      const outlandsGroup = new THREE.Group();
      const outlandsOrbitRadius = 110; // Between Elemental and Outer
      const outlandsSphere = createLabeledSphere("Outlands", 0x228b22, 10);
      outlandsSphere.position.set(outlandsOrbitRadius, 0, 0); // Just one sphere orbiting? Or a ring? In lore it's the ring, but let's keep it as an object for the wheel structure
      // Actually, let's represent the Outlands as a faint torus itself with the Spire in the middle?
      // Reverting to user's structure: It was a sphere.
      outlandsGroup.add(outlandsSphere);
      scene.add(outlandsGroup);
      addOrbitRing(outlandsOrbitRadius, 0.05);

      // 4. Material Plane & Inner Spheres
      // Center (Prime Material)
      const materialPlane = createLabeledSphere("Material Plane", 0x1a2b3c, 24, 0.4);
      materialPlane.material.emissiveIntensity = 0; // Less emissive, more physical
      
      // Add a glow sprite for atmosphere
      const spriteMat = new THREE.SpriteMaterial({ 
          map: new THREE.CanvasTexture(generateGlowTexture()), 
          color: 0x4488ff, 
          transparent: true, 
          blending: THREE.AdditiveBlending 
      });
      const glowSprite = new THREE.Sprite(spriteMat);
      glowSprite.scale.set(70, 70, 1.0);
      materialPlane.add(glowSprite);
      scene.add(materialPlane);

      // Inner Planes (Feywild/Shadowfell)
      const innerOrbitGroup = new THREE.Group();
      const innerOrbitRadius = 35;
      const innerPlanes = [
        { name: "Feywild", color: 0xff1493 },
        { name: "Shadowfell", color: 0x2f2f2f },
      ];
      innerPlanes.forEach((plane, i) => {
        const angle = (i / innerPlanes.length) * Math.PI * 2;
        const sphere = createLabeledSphere(plane.name, plane.color, 7);
        sphere.position.set(innerOrbitRadius * Math.cos(angle), 0, innerOrbitRadius * Math.sin(angle));
        innerOrbitGroup.add(sphere);
      });
      scene.add(innerOrbitGroup);
      addOrbitRing(innerOrbitRadius, 0.15);
      
      // ---------------------------
      // Utils
      // ---------------------------
      function generateGlowTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.2, 'rgba(255,255,255,0.5)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        return canvas;
      }

      // ---------------------------
      // Logic & Animation
      // ---------------------------
      const playBtn = document.getElementById("playPause");
      playBtn.addEventListener("click", () => {
        params.playing = !params.playing;
        playBtn.textContent = params.playing ? "❚❚" : "▶";
      });
      
      document.getElementById("outerSpeed").addEventListener("input", e => params.outerSpeed = parseFloat(e.target.value));
      document.getElementById("elementalSpeed").addEventListener("input", e => params.elementalSpeed = parseFloat(e.target.value));
      document.getElementById("outlandsSpeed").addEventListener("input", e => params.outlandsSpeed = parseFloat(e.target.value));
      document.getElementById("innerSpeed").addEventListener("input", e => params.innerSpeed = parseFloat(e.target.value));
      document.getElementById("starRotation").addEventListener("input", e => params.starRotation = parseFloat(e.target.value));
      
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        
        if (params.playing) {
          starField.rotation.y += params.starRotation;
          outerGroup.rotation.y += params.outerSpeed;
          elementalGroup.rotation.y += params.elementalSpeed;
          outlandsGroup.rotation.y += params.outlandsSpeed;
          innerOrbitGroup.rotation.y += params.innerSpeed;
          materialPlane.rotation.y += 0.001;
        }

        // Chaos color shifting
        const time = Date.now() * 0.001;
        scene.traverse(obj => {
          if (obj.userData.isChaos && obj.children.length > 0) {
             const pts = obj.children[0];
             if(pts.material) {
                pts.material.color.setHSL(Math.sin(time)*0.5 + 0.5, 0.8, 0.5);
             }
          }
        });
        
        // Shooting stars update
        shootingStars.forEach(star => {
          star.position.add(star.userData.velocity);
          if (star.position.z < -1500) resetShootingStar(star);
        });
        
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
      }
      
      animate();
      
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        controls.handleResize();
      });
    </script>
  </body>
</html>
