<!DOCTYPE html>
<html lang="en" data-theme="onyx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Character Sheet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <style>
        /* --- THEME VARIABLES --- */
        :root[data-theme="onyx"] {
            --bg-body: #09090b;
            --bg-surface: #121212;
            --bg-element: #1e1e20;
            --line: #27272a;
            --text-main: #ffffff;
            --text-muted: #52525b;
            --accent: #ff3b30;
            --accent-fg: #ffffff;
        }

        :root[data-theme="polar"] {
            --bg-body: #f5f5f7;
            --bg-surface: #ffffff;
            --bg-element: #f2f2f7;
            --line: #d1d1d6;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --accent: #007aff;
            --accent-fg: #ffffff;
        }

        :root[data-theme="midnight"] {
            --bg-body: #020617;
            --bg-surface: #0f172a;
            --bg-element: #1e293b;
            --line: #334155;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-fg: #0f172a;
        }

        :root[data-theme="botanical"] {
            --bg-body: #f1f8e9;
            --bg-surface: #ffffff;
            --bg-element: #dcedc8;
            --line: #aed581;
            --text-main: #33691e;
            --text-muted: #689f38;
            --accent: #558b2f;
            --accent-fg: #ffffff;
        }

        /* --- GLOBAL RESET & TYPOGRAPHY --- */
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        input, select, textarea {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            width: 100%;
            transition: color 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; color: var(--accent); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        select { -webkit-appearance: none; cursor: pointer; }

        .label-mono {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
        }

        /* --- UI COMPONENTS --- */
        .swiss-panel { background: var(--bg-surface); border: 1px solid var(--line); padding: 24px; }
        
        .swiss-check {
            display: flex; align-items: center; cursor: pointer; gap: 12px; padding: 4px 8px; border-radius: 4px; transition: background 0.1s;
        }
        .swiss-check:hover { background: var(--bg-element); }
        .swiss-check input { display: none; }
        .swiss-check-box { width: 14px; height: 14px; border: 2px solid var(--line); display: inline-block; position: relative; transition: all 0.2s; }
        .swiss-check input:checked + .swiss-check-box { background: var(--accent); border-color: var(--accent); }
        .swiss-check-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); transition: color 0.2s; }
        .swiss-check input:checked ~ .swiss-check-label { color: var(--text-main); }

        .swiss-stepper {
            display: flex; align-items: center; background: var(--bg-element); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; height: 32px;
        }
        .swiss-stepper btn {
            width: 32px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.1s; font-size: 0.8rem; user-select: none;
        }
        .swiss-stepper btn:hover { background: var(--line); color: var(--text-main); }
        .swiss-stepper btn:active { background: var(--accent); color: var(--accent-fg); }
        .swiss-stepper input { text-align: center; font-weight: 700; font-size: 0.9rem; height: 100%; }

        /* --- HEADER & NAV --- */
        header { background: var(--bg-surface); border-bottom: 1px solid var(--line); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 24px; z-index: 50; }
        
        .nav-strip { display: flex; background: var(--bg-surface); border-bottom: 1px solid var(--line); padding: 0 24px; gap: 4px; }
        .nav-btn {
            padding: 12px 16px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:hover { color: var(--text-main); background: var(--bg-element); }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* --- GRID --- */
        .layout-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
        .cell { background: var(--bg-surface); padding: 16px; }
        
        .stat-block { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; background: var(--bg-surface); transition: background 0.2s; }
        .stat-block:hover { background: var(--bg-element); }
        .stat-val { font-size: 1.75rem; font-weight: 900; line-height: 1; letter-spacing: -0.05em; }
        .stat-mod { font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-top: 4px; }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 2px; padding: 2px; }
        .inv-slot {
            aspect-ratio: 1; background: var(--bg-surface); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; position: relative; transition: all 0.2s;
        }
        .inv-slot:hover { background: var(--bg-element); border-color: var(--accent); z-index: 10; }
        .inv-qty {
            position: absolute; bottom: 2px; right: 2px; font-size: 0.6rem; font-weight: 700; color: var(--accent); background: var(--bg-surface); padding: 0 3px; border-radius: 2px; border: 1px solid var(--line);
        }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--bg-surface); border: 1px solid var(--line); width: 100%; max-width: 400px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 16px; }
        
        /* Alignment Grid */
        .align-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 8px; }
        .align-cell {
            aspect-ratio: 1; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 900; cursor: pointer; transition: all 0.2s;
            text-align: center; color: rgba(255,255,255,0.7);
        }
        .align-cell:hover { transform: scale(1.05); color: #fff; border-color: #fff; }
        
        /* Alignment Colors */
        .lg { background: #1e3a8a; } .ng { background: #3b82f6; } .cg { background: #10b981; }
        .ln { background: #854d0e; } .nn { background: #52525b; } .cn { background: #064e3b; }
        .le { background: #7f1d1d; } .ne { background: #450a0a; } .ce { background: #991b1b; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="flex flex-col w-full max-w-6xl mx-auto md:flex-row md:items-end justify-between gap-4">
            <div class="flex-grow">
                <input type="text" id="charName" class="text-3xl font-black uppercase tracking-tighter w-full" placeholder="CHARACTER NAME">
                <div class="flex gap-4 mt-2 border-t border-[var(--line)] pt-2 w-max">
                    <!-- Class Dropdown -->
                    <select id="charClass" class="text-xs font-bold uppercase text-[var(--text-muted)] w-24 bg-transparent cursor-pointer" onchange="updateClassDefaults()"></select>
                    
                    <!-- Level -->
                    <input type="number" id="charLevel" class="text-xs font-bold uppercase text-[var(--text-muted)] w-8 text-center" value="1">
                    
                    <!-- Race Dropdown -->
                    <select id="charRace" class="text-xs font-bold uppercase text-[var(--text-muted)] w-24 bg-transparent cursor-pointer" onchange="updateRaceDefaults()"></select>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center border border-[var(--line)] text-[var(--text-muted)] hover:text-[var(--accent)] hover:border-[var(--accent)] transition">
                    <i class="fas fa-adjust"></i>
                </button>
                <button onclick="saveData()" class="w-8 h-8 flex items-center justify-center border border-[var(--line)] text-[var(--text-muted)] hover:text-green-500 hover:border-green-500 transition">
                    <i class="fas fa-save"></i>
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="w-8 h-8 flex items-center justify-center border border-[var(--line)] text-[var(--text-muted)] hover:text-blue-500 hover:border-blue-500 transition">
                    <i class="fas fa-upload"></i>
                </button>
                <button onclick="exportData()" class="w-8 h-8 flex items-center justify-center border border-[var(--line)] text-[var(--text-muted)] hover:text-purple-500 hover:border-purple-500 transition">
                    <i class="fas fa-download"></i>
                </button>
                <input type="file" id="fileInput" class="hidden" onchange="importData(this)">
            </div>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="nav-strip justify-center">
        <button onclick="switchTab('main')" class="nav-btn active" data-tab="main">Stats</button>
        <button onclick="switchTab('combat')" class="nav-btn" data-tab="combat">Combat</button>
        <button onclick="switchTab('inventory')" class="nav-btn" data-tab="inventory">Gear</button>
        <button onclick="switchTab('spells')" class="nav-btn" data-tab="spells">Spells</button>
        <button onclick="switchTab('bio')" class="nav-btn" data-tab="bio">Bio</button>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-grow overflow-y-auto bg-[var(--bg-body)] p-4">
        <div class="max-w-6xl mx-auto pb-20">

            <!-- TAB 1: STATS -->
            <div id="main" class="tab-content active fade-in">
                <!-- Vitals Grid -->
                <div class="layout-grid grid-cols-2 md:grid-cols-6 mb-6 border border-[var(--line)]">
                    
                    <!-- HP -->
                    <div class="cell col-span-2 md:col-span-2 flex flex-col justify-between">
                        <div class="flex justify-between items-center mb-2">
                            <label class="label-mono">Hit Points</label>
                            <span class="text-xs text-[var(--text-muted)] font-mono">CUR / MAX</span>
                        </div>
                        <div class="flex gap-2">
                            <div class="swiss-stepper flex-grow">
                                <btn onclick="adj('currentHp', -1)">-</btn>
                                <input type="number" id="currentHp" value="0">
                                <btn onclick="adj('currentHp', 1)">+</btn>
                            </div>
                            <div class="swiss-stepper w-20 border-[var(--line)]">
                                <input type="number" id="maxHp" value="0" class="text-[var(--text-muted)]">
                            </div>
                        </div>
                    </div>

                    <!-- Temp HP -->
                    <div class="cell col-span-1 md:col-span-1">
                        <label class="label-mono">Temp HP</label>
                        <div class="swiss-stepper mt-2 border-[var(--accent)]">
                            <btn onclick="adj('tempHp', -1)">-</btn>
                            <input type="number" id="tempHp" value="0" class="text-[var(--accent)]">
                            <btn onclick="adj('tempHp', 1)">+</btn>
                        </div>
                    </div>

                    <!-- AC -->
                    <div class="cell col-span-1 md:col-span-1 text-center">
                        <label class="label-mono">AC</label>
                        <input type="number" id="armorClass" class="stat-val text-center mt-1" value="10">
                    </div>

                    <!-- Init -->
                    <div class="cell col-span-1 md:col-span-1 text-center">
                        <label class="label-mono">Init</label>
                        <input type="number" id="initiative" class="stat-val text-center mt-1" value="0">
                    </div>

                    <!-- Speed -->
                    <div class="cell col-span-1 md:col-span-1 text-center">
                        <label class="label-mono">Speed</label>
                        <input type="text" id="speed" class="stat-val text-center mt-1 text-xl" value="30">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <!-- Attributes -->
                    <div class="md:col-span-1 flex flex-col gap-px bg-[var(--line)] border border-[var(--line)]" id="abilitiesContainer"></div>

                    <!-- Skills & Saves -->
                    <div class="md:col-span-3 swiss-panel">
                        <div class="flex justify-between border-b border-[var(--line)] pb-2 mb-4">
                            <span class="label-mono text-[var(--accent)]">PROFICIENCY MATRIX</span>
                            <div class="text-xs font-bold">PB: <span id="profBonusDisplay" class="text-[var(--text-main)]">+2</span></div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
                            <div id="skillsListLeft" class="flex flex-col gap-1"></div>
                            <div id="skillsListRight" class="flex flex-col gap-1"></div>
                        </div>

                        <div class="mt-8 pt-4 border-t border-[var(--line)]">
                            <label class="label-mono mb-3">Saving Throws</label>
                            <div class="flex flex-wrap gap-4" id="savesContainer"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: INVENTORY -->
            <div id="inventory" class="tab-content hidden fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="swiss-panel h-min">
                        <label class="label-mono mb-4 border-b border-[var(--line)] pb-2">Liquid Assets</label>
                        <div class="flex items-center justify-between mb-3"><span class="text-xs font-bold text-yellow-500">GP</span><div class="swiss-stepper w-24"><btn onclick="adj('gp', -1)">-</btn><input type="number" id="gp" value="0"><btn onclick="adj('gp', 1)">+</btn></div></div>
                        <div class="flex items-center justify-between mb-3"><span class="text-xs font-bold text-gray-400">SP</span><div class="swiss-stepper w-24"><btn onclick="adj('sp', -1)">-</btn><input type="number" id="sp" value="0"><btn onclick="adj('sp', 1)">+</btn></div></div>
                        <div class="flex items-center justify-between mb-6"><span class="text-xs font-bold text-orange-700">CP</span><div class="swiss-stepper w-24"><btn onclick="adj('cp', -1)">-</btn><input type="number" id="cp" value="0"><btn onclick="adj('cp', 1)">+</btn></div></div>
                        <div class="text-center pt-4 border-t border-[var(--line)]"><label class="label-mono">Load (lbs)</label><div id="totalWeightDisplay" class="text-2xl font-black mt-1">0</div></div>
                    </div>

                    <div class="lg:col-span-3">
                        <div class="swiss-panel">
                            <div class="flex justify-between items-center mb-4 border-b border-[var(--line)] pb-2">
                                <label class="label-mono text-[var(--accent)]">GEAR GRID</label>
                                <button onclick="addInvItem()" class="text-[10px] bg-[var(--bg-element)] px-2 py-1 uppercase font-bold hover:text-[var(--accent)] transition border border-[var(--line)]"><i class="fas fa-plus mr-1"></i> Add Item</button>
                            </div>
                            <div class="inv-grid" id="inventoryGrid"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 3: COMBAT -->
            <div id="combat" class="tab-content hidden fade-in">
                <div class="swiss-panel mb-6">
                    <div class="flex justify-between items-center mb-4 border-b border-[var(--line)] pb-2">
                        <span class="label-mono text-[var(--accent)]">OFFENSIVE CAPABILITIES</span>
                        <button onclick="addAttack()" class="text-[10px] bg-[var(--bg-element)] px-2 py-1 uppercase font-bold hover:text-[var(--accent)]">+ Add</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm"><tbody id="attacksList"></tbody></table>
                    </div>
                </div>

                <div class="swiss-panel">
                    <label class="label-mono mb-2">Class Features & Traits</label>
                    <textarea id="features" class="w-full h-64 bg-[var(--bg-element)] p-4 font-mono text-xs border border-[var(--line)] resize-y focus:border-[var(--accent)]"></textarea>
                </div>
            </div>

            <!-- TAB 4: SPELLS -->
            <div id="spells" class="tab-content hidden fade-in">
                <div class="swiss-panel">
                    <div class="grid grid-cols-3 gap-1 bg-[var(--line)] border border-[var(--line)] mb-8">
                        <div class="stat-block"><label class="label-mono">Mod</label><select id="spellAbility" class="text-center font-bold uppercase" onchange="calculateSpells()"><option value="int">INT</option><option value="wis">WIS</option><option value="cha">CHA</option></select></div>
                        <div class="stat-block"><label class="label-mono">DC</label><div id="spellSaveDC" class="stat-val text-[var(--accent)]">8</div></div>
                        <div class="stat-block"><label class="label-mono">Atk</label><div id="spellAtkBonus" class="stat-val">+0</div></div>
                    </div>
                    <div id="spellSlotsContainer" class="space-y-2"></div>
                </div>
            </div>

            <!-- TAB 5: BIO -->
            <div id="bio" class="tab-content hidden fade-in">
                <div class="swiss-panel">
                    <div class="grid grid-cols-2 gap-6 mb-6">
                        <div><label class="label-mono">Alignment</label><input type="text" id="alignment" class="border-b border-[var(--line)] py-1 cursor-pointer" onclick="openAlignmentModal()" readonly placeholder="Select..."></div>
                        <div><label class="label-mono">XP</label><input type="text" id="xp" class="border-b border-[var(--line)] py-1"></div>
                    </div>
                    <label class="label-mono">Backstory</label>
                    <textarea id="backstory" class="w-full h-40 bg-[var(--bg-element)] p-3 mb-6 font-mono text-xs border border-[var(--line)]"></textarea>
                    <label class="label-mono">Notes</label>
                    <textarea id="allies" class="w-full h-40 bg-[var(--bg-element)] p-3 font-mono text-xs border border-[var(--line)]"></textarea>
                </div>
            </div>

        </div>
    </main>

    <!-- ITEM MODAL -->
    <div id="itemModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header-grid">
                <div class="h-14 w-14 bg-[var(--bg-element)] border border-[var(--line)] flex items-center justify-center text-3xl rounded"><input type="text" id="itemIcon" class="text-center w-full h-full bg-transparent cursor-default" readonly></div>
                <div class="flex flex-col justify-center h-full"><label class="label-mono">Designation</label><input type="text" id="itemName" class="text-lg font-bold border-b border-[var(--line)] pb-1 focus:border-[var(--accent)]" placeholder="Item Name"></div>
                <button onclick="closeModal('itemModal')" class="text-2xl text-[var(--text-muted)] hover:text-[var(--accent)] self-start">&times;</button>
            </div>
            <div><label class="label-mono mb-2">Preset Icon</label><div class="emoji-grid grid grid-cols-8 gap-1 h-24 overflow-y-auto bg-[var(--bg-element)] p-2 border border-[var(--line)]"></div></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="label-mono">Weight</label><div class="swiss-stepper mt-1"><btn onclick="adj('itemWeight', -1)">-</btn><input type="number" id="itemWeight" value="0"><btn onclick="adj('itemWeight', 1)">+</btn></div></div>
                <div><label class="label-mono">Qty</label><div class="swiss-stepper mt-1"><btn onclick="adj('itemQty', -1)">-</btn><input type="number" id="itemQty" value="1"><btn onclick="adj('itemQty', 1)">+</btn></div></div>
            </div>
            <div><label class="label-mono">Specs</label><textarea id="itemDesc" class="w-full h-20 bg-[var(--bg-element)] border border-[var(--line)] p-2 text-xs font-mono mt-1"></textarea></div>
            <div class="flex justify-between pt-4 border-t border-[var(--line)]"><input type="hidden" id="modalSlotIndex"><button onclick="deleteItemAction()" id="btnDelete" class="text-xs font-bold text-red-500 uppercase">Delete</button><button onclick="saveItemAction()" class="bg-[var(--text-main)] text-[var(--bg-body)] px-6 py-2 text-xs font-bold uppercase hover:opacity-90">Confirm</button></div>
        </div>
    </div>

    <!-- ALIGNMENT MODAL -->
    <div id="alignmentModal" class="modal-overlay">
        <div class="modal-card" style="max-width: 320px;">
            <div class="flex justify-between items-center"><span class="label-mono text-[var(--accent)]">SELECT ALIGNMENT</span><button onclick="closeModal('alignmentModal')" class="text-xl">&times;</button></div>
            <div class="align-grid">
                <div class="align-cell lg" onclick="setAlignment('Lawful Good')">LG</div>
                <div class="align-cell ng" onclick="setAlignment('Neutral Good')">NG</div>
                <div class="align-cell cg" onclick="setAlignment('Chaotic Good')">CG</div>
                <div class="align-cell ln" onclick="setAlignment('Lawful Neutral')">LN</div>
                <div class="align-cell nn" onclick="setAlignment('True Neutral')">N</div>
                <div class="align-cell cn" onclick="setAlignment('Chaotic Neutral')">CN</div>
                <div class="align-cell le" onclick="setAlignment('Lawful Evil')">LE</div>
                <div class="align-cell ne" onclick="setAlignment('Neutral Evil')">NE</div>
                <div class="align-cell ce" onclick="setAlignment('Chaotic Evil')">CE</div>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script>
        const MAX_SLOTS = 35; 
        const themes = ['onyx', 'polar', 'midnight', 'botanical'];
        let currentThemeIndex = 0;
        const abilities = ['str', 'dex', 'con', 'int', 'wis', 'cha'];
        const skills = [{n:'Acrobatics', s:'dex'}, {n:'Animal Handling', s:'wis'}, {n:'Arcana', s:'int'}, {n:'Athletics', s:'str'}, {n:'Deception', s:'cha'}, {n:'History', s:'int'}, {n:'Insight', s:'wis'}, {n:'Intimidation', s:'cha'}, {n:'Investigation', s:'int'}, {n:'Medicine', s:'wis'}, {n:'Nature', s:'int'}, {n:'Perception', s:'wis'}, {n:'Performance', s:'cha'}, {n:'Persuasion', s:'cha'}, {n:'Religion', s:'int'}, {n:'Sleight of Hand', s:'dex'}, {n:'Stealth', s:'dex'}, {n:'Survival', s:'wis'}];
        const emojiList = ["⚔️","🛡️","🏹","🧪","📜","🎒","🍞","🕯️","🗝️","💍","🧿","💎","💰","🔨","🪓","🧥","👞","🪖","🎵","📓","🧊","🔥","☠️","🥩","🍷","🛌","🪵","🏺","🧬","🗡️","🔮","🦠","🦴","🧲","🧱"];
        
        // --- DB ---
        const dbClasses = {
            "Barbarian": { hd: 12, saves: ['str','con'] },
            "Bard": { hd: 8, saves: ['dex','cha'] },
            "Cleric": { hd: 8, saves: ['wis','cha'] },
            "Druid": { hd: 8, saves: ['int','wis'] },
            "Fighter": { hd: 10, saves: ['str','con'] },
            "Monk": { hd: 8, saves: ['str','dex'] },
            "Paladin": { hd: 10, saves: ['wis','cha'] },
            "Ranger": { hd: 10, saves: ['str','dex'] },
            "Rogue": { hd: 8, saves: ['dex','int'] },
            "Sorcerer": { hd: 6, saves: ['con','cha'] },
            "Warlock": { hd: 8, saves: ['wis','cha'] },
            "Wizard": { hd: 6, saves: ['int','wis'] },
            "Artificer": { hd: 8, saves: ['con','int'] }
        };
        const dbRaces = {
            "Dragonborn": { spd: 30, bonus: "+2 STR, +1 CHA" },
            "Dwarf": { spd: 25, bonus: "+2 CON" },
            "Elf": { spd: 30, bonus: "+2 DEX" },
            "Gnome": { spd: 25, bonus: "+2 INT" },
            "Half-Elf": { spd: 30, bonus: "+2 CHA, +1 to two others" },
            "Halfling": { spd: 25, bonus: "+2 DEX" },
            "Half-Orc": { spd: 30, bonus: "+2 STR, +1 CON" },
            "Human": { spd: 30, bonus: "+1 to All" },
            "Tiefling": { spd: 30, bonus: "+2 CHA, +1 INT" }
        };

        let inventoryData = new Array(MAX_SLOTS).fill(null); 

        // Init
        window.onload = function() {
            populateSelects();
            renderUI();
            loadData();
            calculateAll();
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('input', () => { calculateAll(); debouncedSave(); });
            });
        };

        function populateSelects() {
            const cSel = document.getElementById('charClass');
            const rSel = document.getElementById('charRace');
            Object.keys(dbClasses).forEach(k => cSel.add(new Option(k,k)));
            Object.keys(dbRaces).forEach(k => rSel.add(new Option(k,k)));
        }

        // Logic
        function updateClassDefaults() {
            const cls = document.getElementById('charClass').value;
            const data = dbClasses[cls];
            if(data) {
                // Auto-suggest HP (Max at lvl 1)
                const lvl = parseInt(document.getElementById('charLevel').value)||1;
                // Only set if HP is 0 to avoid overwriting current game state
                if(parseInt(document.getElementById('maxHp').value) === 0) {
                     document.getElementById('maxHp').value = data.hd;
                     document.getElementById('currentHp').value = data.hd;
                }
                
                // Highlight saves (toggle checks if unchecked)
                abilities.forEach(a => {
                    document.getElementById(`sv_${a}_p`).checked = data.saves.includes(a);
                });
                calculateAll();
                debouncedSave();
            }
        }

        function updateRaceDefaults() {
            const race = document.getElementById('charRace').value;
            const data = dbRaces[race];
            if(data) {
                document.getElementById('speed').value = data.spd;
                
                // Append traits info to Features
                const featArea = document.getElementById('features');
                const timestamp = new Date().toLocaleTimeString();
                const log = `\n[${timestamp}] Race changed to ${race}. Racial Bonuses: ${data.bonus}. (Please manually adjust stats if needed).`;
                featArea.value += log;
                debouncedSave();
            }
        }

        // Alignment
        function openAlignmentModal() { document.getElementById('alignmentModal').style.display = 'flex'; }
        function setAlignment(val) {
            document.getElementById('alignment').value = val;
            closeModal('alignmentModal');
            debouncedSave();
        }

        // --- RENDERERS ---
        function renderUI() {
            // Attributes
            document.getElementById('abilitiesContainer').innerHTML = abilities.map(s => `
                <div class="stat-block group flex-grow">
                    <label class="label-mono group-hover:text-[var(--text-main)] transition">${s}</label>
                    <input type="number" id="${s}" value="10" class="stat-val text-center w-full bg-transparent">
                    <div class="stat-mod" id="${s}Mod">+0</div>
                </div>`).join('');

            // Skills
            const makeRow = (sk, i) => `
                <label class="swiss-check">
                    <input type="checkbox" id="sk_${i}_p" onchange="calculateAll(); debouncedSave()">
                    <span class="swiss-check-box"></span>
                    <span class="swiss-check-label flex-grow">${sk.n}</span>
                    <span id="sk_${i}_v" class="font-mono text-xs font-bold text-[var(--text-muted)]">+0</span>
                </label>`;
            const mid = Math.ceil(skills.length/2);
            document.getElementById('skillsListLeft').innerHTML = skills.slice(0,mid).map((s,i) => makeRow(s,i)).join('');
            document.getElementById('skillsListRight').innerHTML = skills.slice(mid).map((s,i) => makeRow(s,i+mid)).join('');

            // Saves
            document.getElementById('savesContainer').innerHTML = abilities.map(s => `
                <label class="swiss-check" style="padding:0">
                    <input type="checkbox" id="sv_${s}_p" onchange="calculateAll(); debouncedSave()">
                    <span class="swiss-check-box"></span>
                    <span class="swiss-check-label">${s}</span>
                    <span id="sv_${s}" class="font-mono text-xs font-bold ml-1 text-[var(--text-main)]">+0</span>
                </label>`).join('');

            // Spells
            let spellsHtml = '';
            for(let i=1; i<=9; i++) spellsHtml += `
                <div class="flex items-center gap-2 py-1">
                    <span class="w-6 text-xs font-bold text-[var(--text-muted)]">L${i}</span>
                    <div class="swiss-stepper w-20"><btn onclick="adj('sp_u_${i}', -1)">-</btn><input type="number" id="sp_u_${i}" value="0"><btn onclick="adj('sp_u_${i}', 1)">+</btn></div>
                    <span class="text-xs text-[var(--text-muted)]">/</span>
                    <div class="swiss-stepper w-20"><btn onclick="adj('sp_m_${i}', -1)">-</btn><input type="number" id="sp_m_${i}" value="0"><btn onclick="adj('sp_m_${i}', 1)">+</btn></div>
                    <input type="text" class="flex-grow text-xs ml-2 font-mono text-[var(--text-muted)] border-b border-transparent focus:border-[var(--line)]" id="sp_n_${i}" placeholder="...">
                </div>`;
            document.getElementById('spellSlotsContainer').innerHTML = spellsHtml;

            // Emojis
            const eGrid = document.querySelector('.emoji-grid');
            emojiList.forEach(e => {
                const d = document.createElement('div');
                d.className = 'text-center p-1 text-xl cursor-pointer hover:bg-[var(--line)] rounded';
                d.textContent = e;
                d.onclick = () => document.getElementById('itemIcon').value = e;
                eGrid.appendChild(d);
            });
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            let totalWt = 0;
            inventoryData.forEach((item, idx) => {
                const slot = document.createElement('div');
                slot.className = `inv-slot ${!item ? 'empty' : ''}`;
                slot.onclick = () => openItemModal(idx);
                if (item) {
                    slot.innerHTML = `<span>${item.icon}</span>${item.qty > 1 ? `<span class="inv-qty">${item.qty}</span>` : ''}`;
                    totalWt += (parseFloat(item.weight)||0) * (parseFloat(item.qty)||1);
                } else {
                    slot.innerHTML = `<i class="fas fa-plus text-[var(--text-muted)] text-sm opacity-50 hover:opacity-100 transition"></i>`;
                }
                grid.appendChild(slot);
            });
            document.getElementById('totalWeightDisplay').textContent = totalWt.toFixed(1);
        }

        // --- UTILS ---
        function addInvItem() {
            const idx = inventoryData.findIndex(x => x === null);
            if(idx === -1) return alert("Grid Full");
            openItemModal(idx);
        }
        function adj(id, delta) {
            const el = document.getElementById(id);
            let v = parseInt(el.value) || 0;
            el.value = v + delta;
            el.dispatchEvent(new Event('input'));
        }
        function getMod(val) { return Math.floor((val - 10) / 2); }
        function fmt(val) { return (val >= 0 ? '+' : '') + val; }

        function calculateAll() {
            const lvl = parseInt(document.getElementById('charLevel').value) || 1;
            const pb = Math.ceil(lvl / 4) + 1;
            document.getElementById('profBonusDisplay').textContent = `+${pb}`;

            const mods = {};
            abilities.forEach(s => {
                const val = parseInt(document.getElementById(s).value) || 10;
                mods[s] = getMod(val);
                document.getElementById(`${s}Mod`).textContent = fmt(mods[s]);
                const prof = document.getElementById(`sv_${s}_p`).checked;
                document.getElementById(`sv_${s}`).textContent = fmt(mods[s] + (prof ? pb : 0));
            });
            skills.forEach((sk, i) => {
                const prof = document.getElementById(`sk_${i}_p`).checked;
                document.getElementById(`sk_${i}_v`).textContent = fmt(mods[sk.s] + (prof ? pb : 0));
            });
            const spellAbi = document.getElementById('spellAbility').value || 'int';
            const spellMod = mods[spellAbi] || 0;
            document.getElementById('spellSaveDC').textContent = 8 + pb + spellMod;
            document.getElementById('spellAtkBonus').textContent = fmt(pb + spellMod);
        }

        function toggleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            document.documentElement.setAttribute('data-theme', themes[currentThemeIndex]);
            debouncedSave();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(e => { e.classList.add('hidden'); e.classList.remove('active'); });
            document.getElementById(id).classList.remove('hidden');
            setTimeout(() => document.getElementById(id).classList.add('active'), 10);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-tab="${id}"]`).classList.add('active');
        }

        function addAttack(data={}) {
            const row = document.createElement('tr');
            row.className = "border-b border-[var(--line)] group";
            row.innerHTML = `
                <td class="py-2"><input type="text" class="font-bold text-sm uppercase" value="${data.n||'Weapon'}"></td>
                <td class="py-2"><input type="text" class="text-center font-mono text-xs text-[var(--accent)]" value="${data.h||'+0'}"></td>
                <td class="py-2"><input type="text" class="font-mono text-xs text-[var(--text-muted)]" value="${data.d||'1d6'}"></td>
                <td class="py-2 text-right"><button onclick="this.closest('tr').remove(); debouncedSave()" class="text-[var(--text-muted)] hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fas fa-trash"></i></button></td>
            `;
            document.getElementById('attacksList').appendChild(row);
        }

        function openItemModal(idx) {
            const item = inventoryData[idx];
            document.getElementById('modalSlotIndex').value = idx;
            document.getElementById('itemIcon').value = item ? item.icon : emojiList[0];
            document.getElementById('itemName').value = item ? item.name : "";
            document.getElementById('itemWeight').value = item ? item.weight : "";
            document.getElementById('itemQty').value = item ? item.qty : 1;
            document.getElementById('itemDesc').value = item ? item.desc : "";
            document.getElementById('btnDelete').classList.toggle('hidden', !item);
            document.getElementById('itemModal').style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function saveItemAction() {
            const idx = document.getElementById('modalSlotIndex').value;
            inventoryData[idx] = {
                icon: document.getElementById('itemIcon').value,
                name: document.getElementById('itemName').value || "Item",
                weight: parseFloat(document.getElementById('itemWeight').value) || 0,
                qty: parseInt(document.getElementById('itemQty').value) || 1,
                desc: document.getElementById('itemDesc').value
            };
            renderInventory(); saveData(); closeModal('itemModal');
        }
        function deleteItemAction() {
            inventoryData[document.getElementById('modalSlotIndex').value] = null;
            renderInventory(); saveData(); closeModal('itemModal');
        }

        let saveTimer;
        function debouncedSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveData, 1000); }
        function saveData() {
            const data = {
                v: 6,
                theme: document.documentElement.getAttribute('data-theme'),
                meta: { 
                    name: document.getElementById('charName').value,
                    cls: document.getElementById('charClass').value,
                    lvl: document.getElementById('charLevel').value,
                    race: document.getElementById('charRace').value,
                    xp: document.getElementById('xp').value,
                    align: document.getElementById('alignment').value
                },
                stats: abilities.map(s => document.getElementById(s).value),
                saves: abilities.map(s => document.getElementById(`sv_${s}_p`).checked),
                skills: skills.map((_,i) => document.getElementById(`sk_${i}_p`).checked),
                vitals: {
                    ac: document.getElementById('armorClass').value,
                    init: document.getElementById('initiative').value,
                    spd: document.getElementById('speed').value,
                    hpC: document.getElementById('currentHp').value,
                    hpM: document.getElementById('maxHp').value,
                    hpT: document.getElementById('tempHp').value
                },
                money: [document.getElementById('gp').value, document.getElementById('sp').value, document.getElementById('cp').value],
                inv: inventoryData,
                text: {
                    bg: document.getElementById('backstory').value,
                    feat: document.getElementById('features').value,
                    notes: document.getElementById('allies').value
                },
                attacks: []
            };
            document.querySelectorAll('#attacksList tr').forEach(row => {
                const i = row.querySelectorAll('input');
                data.attacks.push({ n: i[0].value, h: i[1].value, d: i[2].value });
            });
            data.spells = [];
            for(let i=1;i<=9;i++) {
                data.spells.push({
                    m: document.getElementById(`sp_m_${i}`).value,
                    u: document.getElementById(`sp_u_${i}`).value,
                    n: document.getElementById(`sp_n_${i}`).value
                });
            }
            localStorage.setItem('dndSheet_v6_Isaiah', JSON.stringify(data));
        }

        function loadData() {
            const raw = localStorage.getItem('dndSheet_v6_Isaiah');
            if(!raw) return;
            const data = JSON.parse(raw);
            if(data.theme) document.documentElement.setAttribute('data-theme', data.theme);
            
            document.getElementById('charName').value = data.meta.name;
            document.getElementById('charClass').value = data.meta.cls;
            document.getElementById('charLevel').value = data.meta.lvl;
            document.getElementById('charRace').value = data.meta.race;
            document.getElementById('xp').value = data.meta.xp;
            document.getElementById('alignment').value = data.meta.align;

            abilities.forEach((s,i) => document.getElementById(s).value = data.stats[i]);
            abilities.forEach((s,i) => document.getElementById(`sv_${s}_p`).checked = data.saves[i]);
            skills.forEach((_,i) => document.getElementById(`sk_${i}_p`).checked = data.skills[i]);

            document.getElementById('armorClass').value = data.vitals.ac;
            document.getElementById('initiative').value = data.vitals.init;
            document.getElementById('speed').value = data.vitals.spd;
            document.getElementById('currentHp').value = data.vitals.hpC;
            document.getElementById('maxHp').value = data.vitals.hpM;
            document.getElementById('tempHp').value = data.vitals.hpT;

            document.getElementById('gp').value = data.money[0];
            document.getElementById('sp').value = data.money[1];
            document.getElementById('cp').value = data.money[2];

            if(data.inv) inventoryData = data.inv;

            document.getElementById('backstory').value = data.text.bg;
            document.getElementById('features').value = data.text.feat;
            document.getElementById('allies').value = data.text.notes;

            document.getElementById('attacksList').innerHTML = '';
            data.attacks.forEach(a => addAttack(a));

            if(data.spells) {
                data.spells.forEach((s, i) => {
                    const idx = i+1;
                    document.getElementById(`sp_u_${idx}`).value = s.u;
                    document.getElementById(`sp_m_${idx}`).value = s.m;
                    document.getElementById(`sp_n_${idx}`).value = s.n;
                });
            }
        }
        function exportData() {
            saveData();
            const blob = new Blob([localStorage.getItem('dndSheet_v6_Isaiah')], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `agent_${document.getElementById('charName').value}.json`;
            a.click();
        }
        function importData(input) {
            const r = new FileReader();
            r.onload = e => { localStorage.setItem('dndSheet_v6_Isaiah', e.target.result); location.reload(); };
            r.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
