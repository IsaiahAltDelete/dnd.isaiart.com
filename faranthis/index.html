<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faranthis - D&D Campaign</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }
        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }
        a {
            color: #f4f4f4;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #f4f4f4;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #f4f4f4;
            color: #1a1a1a;
        }
        .fade-out {
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                background-color: white;
            }
        }
    </style>
</head>
<body>
    <h1>FARANTHIS FOUSIO</h1>
    <nav>
        <a href="https://dnd.isaiart.com/faranthis/lv1" onclick="fadeOutEffect(event)">LEVEL 1</a>
        <a href="https://dnd.isaiart.com/faranthis/lv2" onclick="fadeOutEffect(event)">LEVEL 2</a>
        <a href="https://dnd.isaiart.com/faranthis/lv3" onclick="fadeOutEffect(event)">LEVEL 3</a>
    </nav>
    <script>
        function fadeOutEffect(event) {
            event.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = event.target.href;
            }, 1000);
        }
    </script>
</body>
</html>
