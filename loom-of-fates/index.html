<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Loom of Fates — Complete Character Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Spectral+SC:wght@400;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--m:#58180D;--ml:#7A3021;--g:#C9AD6A;--gd:#B89956;--p:#EDE5CE;--pl:#F7F2E5;--pd:#E0D5B8;--sb:#F8F1E0;--t:#1A1A1A;--td:#6B6B5E;--r:#9C2B1B}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--p);color:var(--t);font-family:'Libre Baskerville',Georgia,serif;font-size:14px;line-height:1.65;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.004) 2px,rgba(0,0,0,0.004) 4px),radial-gradient(ellipse at 15% 10%,rgba(160,120,60,0.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(140,100,50,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.header{text-align:center;padding:50px 20px 24px;border-bottom:4px solid var(--m)}
.header::after{content:'';display:block;width:180px;height:2px;background:var(--g);margin:14px auto 0}
.header h1{font-family:'Spectral SC',serif;font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:800;color:var(--m);letter-spacing:3px;text-transform:uppercase}
.header .sub{font-family:'Spectral',serif;font-style:italic;font-size:.9rem;color:var(--td);margin-top:6px}
.gen-area{max-width:800px;margin:30px auto;padding:0 20px;position:relative;z-index:1;text-align:center}
.gen-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:20px}
.gen-controls label{font-family:'Spectral SC',serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--m)}
.gen-controls select,.gen-controls input{font-family:'Libre Baskerville',serif;font-size:.8rem;padding:6px 12px;background:var(--pl);color:var(--t);border:1.5px solid var(--pd);cursor:pointer}
.gen-controls select:focus,.gen-controls input:focus{outline:none;border-color:var(--m)}
.gen-btn{font-family:'Spectral SC',serif;font-size:1rem;font-weight:700;color:var(--p);background:var(--m);border:3px solid var(--g);padding:14px 40px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .25s;box-shadow:0 2px 8px rgba(88,24,13,.2)}
.gen-btn:hover{background:var(--ml);box-shadow:0 4px 14px rgba(88,24,13,.3);transform:translateY(-1px)}
/* CHARACTER SHEET */
.sheet{max-width:900px;margin:0 auto 60px;padding:0 20px;display:none;position:relative;z-index:1}
.sheet.visible{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sheet-page{background:var(--pl);border:2px solid var(--pd);box-shadow:0 2px 12px rgba(0,0,0,.08);padding:30px;margin-bottom:24px;position:relative}
.sheet-page::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--m),var(--r),var(--m))}
/* Sheet header */
.sh-top{display:grid;grid-template-columns:1fr auto;gap:16px;padding-bottom:16px;border-bottom:3px solid var(--m);margin-bottom:20px}
.sh-name{font-family:'Spectral SC',serif;font-size:1.8rem;font-weight:800;color:var(--m);line-height:1.2}
.sh-title{font-family:'Spectral',serif;font-style:italic;font-size:.95rem;color:var(--td);margin-top:2px}
.sh-level-badge{font-family:'Spectral SC',serif;font-size:.7rem;font-weight:700;color:var(--p);background:var(--m);padding:6px 14px;letter-spacing:1.5px;text-transform:uppercase;align-self:start;text-align:center;line-height:1.4}
.sh-level-badge .lvl{font-size:1.6rem;display:block;margin-top:2px}
/* Info bar */
.info-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.info-chip{font-family:'Spectral SC',serif;font-size:.55rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;background:var(--sb);border:1px solid var(--g);color:var(--m)}
/* Stats grid */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.stat-box{text-align:center;border:2px solid var(--m);padding:8px 4px;background:var(--pl);position:relative}
.stat-box .stat-name{font-family:'Spectral SC',serif;font-size:.5rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m);margin-bottom:2px}
.stat-box .stat-score{font-family:'Spectral SC',serif;font-size:1.5rem;font-weight:800;color:var(--t)}
.stat-box .stat-mod{font-family:'Spectral',serif;font-size:.8rem;color:var(--ml);font-weight:600}
/* Combat stats */
.combat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.combat-stat{flex:1;min-width:80px;text-align:center;padding:8px;background:var(--sb);border-top:2px solid var(--r);border-bottom:2px solid var(--r)}
.combat-stat .cs-label{font-family:'Spectral SC',serif;font-size:.45rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m)}
.combat-stat .cs-val{font-family:'Spectral SC',serif;font-size:1.2rem;font-weight:800;color:var(--t)}
/* Section headers */
.sec-h{font-family:'Spectral SC',serif;font-size:.9rem;font-weight:700;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid var(--g);padding-bottom:4px;margin:20px 0 12px}
.sec-h:first-child{margin-top:0}
/* Flavor text blocks */
.flav{font-family:'Libre Baskerville',serif;font-size:.82rem;color:var(--t);line-height:1.7;margin-bottom:10px}
.flav strong{color:var(--m);font-family:'Spectral SC',serif;font-size:.65rem;letter-spacing:1px;text-transform:uppercase}
.flav em{color:var(--ml)}
.flav-block{background:var(--sb);border-top:2px solid var(--r);border-bottom:2px solid var(--r);padding:12px 16px;margin:12px 0;font-size:.82rem;line-height:1.7}
.flav-block .fb-title{font-family:'Spectral SC',serif;font-size:.7rem;font-weight:700;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
/* Spell list */
.spell-level-h{font-family:'Spectral SC',serif;font-size:.65rem;font-weight:700;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 4px;padding-bottom:2px;border-bottom:1px solid var(--g)}
.spell-list{font-family:'Libre Baskerville',serif;font-size:.78rem;color:var(--t);line-height:1.6;margin-bottom:8px;padding-left:16px}
.spell-list em{color:var(--ml);font-size:.72rem}
/* Feature list */
.feat-list{list-style:none;padding:0}
.feat-list li{padding:4px 0 4px 14px;border-left:3px solid var(--g);margin-bottom:6px;font-size:.82rem;line-height:1.5}
.feat-list li strong{font-family:'Spectral SC',serif;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--m)}
/* Two column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
/* Equipment grid */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.equip-card{background:rgba(255,255,255,.3);border:1px solid var(--pd);padding:10px 12px}
.equip-card .ec-label{font-family:'Spectral SC',serif;font-size:.5rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m);margin-bottom:3px}
.equip-card .ec-name{font-family:'Spectral',serif;font-size:.9rem;font-weight:600;color:var(--t)}
.equip-card .ec-desc{font-size:.75rem;color:var(--td);margin-top:3px;line-height:1.5;font-style:italic}
/* Personality grid */
.pers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pers-box{padding:10px 12px;border-left:3px solid var(--g);background:rgba(255,255,255,.2)}
.pers-box .pb-label{font-family:'Spectral SC',serif;font-size:.5rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m);margin-bottom:3px}
.pers-box .pb-text{font-size:.8rem;line-height:1.5}
/* Backstory */
.backstory{font-family:'Libre Baskerville',serif;font-size:.82rem;line-height:1.8;color:var(--t);text-align:justify}
.backstory::first-letter{font-family:'Spectral SC',serif;font-size:2.2rem;font-weight:800;color:var(--m);float:left;line-height:.8;margin:4px 6px 0 0}
/* Footer */
.foot{text-align:center;padding:20px;color:var(--td);font-style:italic;font-size:.8rem;border-top:2px solid var(--g);max-width:900px;margin:0 auto}
@media(max-width:700px){.stats-row{grid-template-columns:repeat(3,1fr)}.two-col,.equip-grid,.pers-grid{grid-template-columns:1fr}.sh-top{grid-template-columns:1fr}.gen-controls{flex-direction:column}}
</style>
</head>
<body>
<header class="header">
<h1>The Loom of Fates</h1>

<div class="gen-area">

<div class="sheet" id="sheet"></div>

  var wis=3;
  if(cls==="Wizard")return lvl*2+4;
  if(cls==="Sorcerer")return Math.min(lvl+1,15);
  if(cls==="Warlock")return Math.min(lvl+1,15);
  if(cls==="Bard")return Math.min(lvl+3,22);
  if(cls==="Ranger")return Math.min(Math.floor(lvl/2)+2,11);
  if(cls==="Cleric"||cls==="Druid"||cls==="Paladin")return lvl+wis;
  if(cls==="Artificer")return Math.floor(lvl/2)+3;
  return 0;
}

// === STAT PRIORITY BY CLASS ===
function assignStats(cls){
  var rolls=[];for(var i=0;i<6;i++)rolls.push(roll4d6());
  rolls.sort(function(a,b){return b-a;});
  var order;
  switch(cls){
    case"Barbarian":order=["STR","CON","DEX","WIS","CHA","INT"];break;
    case"Bard":order=["CHA","DEX","CON","WIS","INT","STR"];break;
    case"Cleric":order=["WIS","CON","STR","CHA","DEX","INT"];break;
    case"Druid":order=["WIS","CON","DEX","INT","CHA","STR"];break;
    case"Fighter":order=["STR","CON","DEX","WIS","CHA","INT"];break;
    case"Monk":order=["DEX","WIS","CON","STR","CHA","INT"];break;
    case"Paladin":order=["STR","CHA","CON","WIS","DEX","INT"];break;
    case"Ranger":order=["DEX","WIS","CON","STR","INT","CHA"];break;
    case"Rogue":order=["DEX","INT","CON","CHA","WIS","STR"];break;
    case"Sorcerer":order=["CHA","CON","DEX","WIS","INT","STR"];break;
    case"Warlock":order=["CHA","CON","DEX","WIS","INT","STR"];break;
    case"Wizard":order=["INT","CON","DEX","WIS","CHA","STR"];break;
    case"Artificer":order=["INT","CON","DEX","WIS","CHA","STR"];break;
    default:order=["STR","DEX","CON","INT","WIS","CHA"];
  }
  var stats={};
  order.forEach(function(s,i){stats[s]=rolls[i];});
  return stats;
}

// === HP CALCULATOR ===
function calcHP(cls,lvl,conMod){
  var hd=CLASSES[cls].hd;
  var hp=hd+conMod;
  for(var i=1;i<lvl;i++)hp+=Math.floor(hd/2)+1+conMod;
  return Math.max(hp,lvl);
}

// === NAME GENERATOR ===
function genName(race){
  var key="Human";
  if(race.indexOf("Elf")>=0||race.indexOf("Drow")>=0||race.indexOf("Half-Elf")>=0)key="Elf";
  else if(race.indexOf("Dwarf")>=0||race.indexOf("Duergar")>=0)key="Dwarf";
  else if(race.indexOf("Halfling")>=0)key="Halfling";
  else if(race.indexOf("Tiefling")>=0)key="Tiefling";
  else if(race.indexOf("Dragonborn")>=0)key="Dragonborn";
  else if(race.indexOf("Gnome")>=0)key="Gnome";
  else if(race.indexOf("Half-Orc")>=0||race.indexOf("Goliath")>=0||race.indexOf("Orc")>=0||race.indexOf("Bugbear")>=0||race.indexOf("Firbolg")>=0||race.indexOf("Goblin")>=0||race.indexOf("Hobgoblin")>=0||race.indexOf("Lizardfolk")>=0||race.indexOf("Tabaxi")>=0||race.indexOf("Kenku")>=0||race.indexOf("Tortle")>=0||race.indexOf("Warforged")>=0||race.indexOf("Kobold")>=0)key="Other";
  else key="Human";
  var d=NAMES[key];
  var g=Math.random()>.5?"m":"f";
  var first=R(d[g]);
  var last=d.l&&d.l.length>0?" "+R(d.l):"";
  return first+last;
}

// === GENERATE ===
function generate(){
  var lvlSel=document.getElementById('inLevel').value;
  var clsSel=document.getElementById('inClass').value;
  var raceSel=document.getElementById('inRace').value;
  var level=lvlSel==='random'?Math.floor(Math.random()*20)+1:parseInt(lvlSel);
  var cls=clsSel==='random'?R(Object.keys(CLASSES)):clsSel;
  var race=raceSel==='random'?R(RACES):raceSel;
  var cd=CLASSES[cls];
  var sub=R(cd.subclasses);
  var bg=R(BACKGROUNDS);
  var align=R(ALIGNS);
  var name=genName(race);
  var stats=assignStats(cls);
  var conMod=Math.floor((stats.CON-10)/2);
  var dexMod=Math.floor((stats.DEX-10)/2);
  var hp=calcHP(cls,level,conMod);
  var pb=profBonus(level);
  var ac=10;
  var armorType=cd.armor==="heavy"?"heavy":cd.armor==="medium"?"medium":cd.armor==="light"?"light":"none";
  var armorPick=R(ARMOR_DETAIL[armorType]);
  if(armorType==="heavy")ac=R([14,16,17,18]);
  else if(armorType==="medium")ac=R([13,14,15])+Math.min(dexMod,2);
  else if(armorType==="light")ac=11+dexMod;
  else{if(cls==="Monk")ac=10+dexMod+Math.floor((stats.WIS-10)/2);else if(cls==="Barbarian")ac=10+dexMod+conMod;else ac=10+dexMod;}
  var speed=30;if(race.indexOf("Dwarf")>=0||race.indexOf("Halfling")>=0||race.indexOf("Gnome")>=0)speed=25;if(race.indexOf("Wood Elf")>=0)speed=35;
  var deity=R(DEITIES);
  var origin=R(ORIGINS);
  var skin=R(SKIN);var build=R(BUILDS);var hair=R(HAIR);var eyes=R(EYES);var mark=R(MARKS);var clothing=R(CLOTHING);var fabric=R(FABRICS);
  var color=R(COLORS);var age=R(AGES);var quirk=R(QUIRKS);var vice=R(VICES);var fear=R(FEARS);var trinket=R(TRINKETS);var voice=R(VOICES);var secret=R(SECRETS);var motivation=R(MOTIVATIONS);
  var weapon=R(WEAPONS_DETAIL[cls]||WEAPONS_DETAIL["Fighter"]);
  var spellbook=null;
  if(cls==="Wizard")spellbook=R(SPELLBOOKS);

  // BUILD SPELL LIST
  var spellHTML='';
  var msl=maxSpellLevel(cls,level);
  var isCaster=msl>0;
  var isEK=cls==="Fighter"&&sub.name==="Eldritch Knight";
  var isAT=cls==="Rogue"&&sub.name==="Arcane Trickster";
  var spellClass=cls;
  if(isEK||isAT)spellClass="Wizard";

  if(isCaster||isEK||isAT){
    var nc=numCantrips(isEK||isAT?spellClass:cls,level);
    if(SPELLS.cantrips[spellClass]){
      var clist=SPELLS.cantrips[spellClass].slice();
      var picked=[];for(var c=0;c<Math.min(nc,clist.length);c++){var idx=Math.floor(Math.random()*clist.length);picked.push(clist.splice(idx,1)[0]);}
      spellHTML+='<div class="spell-level-h">Cantrips</div><div class="spell-list">'+picked.join(', ')+'</div>';
    }
    for(var sl=1;sl<=msl;sl++){
      var key='L'+sl;
      var pool=SPELLS[key]&&SPELLS[key][spellClass]?SPELLS[key][spellClass]:null;
      if(!pool)continue;
      pool=pool.slice();
      var num=Math.min(Math.max(2,Math.floor(level/2)+1),pool.length);
      if(sl>6)num=Math.min(2,pool.length);
      var spells=[];for(var s=0;s<num;s++){var si=Math.floor(Math.random()*pool.length);spells.push(pool.splice(si,1)[0]);}
      var slLabel=sl===1?'1st Level':sl===2?'2nd Level':sl===3?'3rd Level':sl+'th Level';
      spellHTML+='<div class="spell-level-h">'+slLabel+' Spells</div><div class="spell-list">'+spells.join(', ')+'</div>';
    }
  }

  // FIGHTING STYLE
  var fightStyle='';
  if(cls==="Fighter"&&cd.fightingStyles)fightStyle=R(cd.fightingStyles);
  if(cls==="Paladin")fightStyle=R(["Defense — +1 AC while wearing armor","Dueling — +2 damage with one-handed weapon","Great Weapon Fighting — rerolls low damage dice","Protection — shield imposes disadvantage on attacks against allies","Blessed Warrior — learns two cleric cantrips","Blind Fighting — 10ft blindsight","Interception — reduces damage to nearby allies"]);
  if(cls==="Ranger")fightStyle=R(["Archery — +2 to ranged attacks","Dueling — +2 damage one-handed","Two-Weapon Fighting — adds modifier to off-hand","Defense — +1 AC","Druidic Warrior — learns two druid cantrips","Thrown Weapon Fighting — +2 thrown damage"]);

  // RAGE REASON
  var rageReason='';
  if(cls==="Barbarian"&&cd.rageReasons)rageReason=R(cd.rageReasons);

  // COMBAT STYLE DESCRIPTION
  var combatDesc='';
  if(cls==="Barbarian")combatDesc="Charges headlong into the fray, '+weapon.n+' swinging in wide devastating arcs. Relies on fury and endurance over finesse. "+rageReason?"What triggers their rage: "+rageReason:"";
  else if(cls==="Fighter")combatDesc="A disciplined combatant who controls the battlefield. "+fightStyle?"Fighting Style: "+fightStyle+".":"";
  else if(cls==="Paladin")combatDesc="Leads from the front, divine energy radiating through every smite. "+fightStyle?"Fighting Style: "+fightStyle+".":"";
  else if(cls==="Ranger")combatDesc="Patient and lethal, striking from optimal range or ambush. "+fightStyle?"Fighting Style: "+fightStyle+".":"";
  else if(cls==="Rogue")combatDesc="Never fights fair. Exploits positioning, surprise, and a single devastating strike. Disengages the moment they're exposed.";
  else if(cls==="Monk")combatDesc="A blur of precise strikes, flowing between offense and defense. Uses ki to enhance speed, stun opponents, and deflect projectiles.";
  else if(cls==="Wizard")combatDesc="Stays at range, layering battlefield control and devastating evocations. Uses Shield and Counterspell defensively, conserving high-level slots for decisive moments.";
  else if(cls==="Sorcerer")combatDesc="Unleashes raw magical power, Twinning and Quickening spells for overwhelming offense. Their magic is instinct, not study.";
  else if(cls==="Warlock")combatDesc="Opens with Hex, then hammers with Eldritch Blast from maximum range. Conserves their precious few spell slots for emergencies.";
  else if(cls==="Bard")combatDesc="Controls the battlefield through inspiration, debuffs, and well-timed spells. Rarely attacks directly — instead ensures every ally hits harder and every enemy fails.";
  else if(cls==="Cleric")combatDesc="The backbone of any group. Heals, buffs, and when necessary, wades into melee with divine power crackling through their weapon.";
  else if(cls==="Druid")combatDesc="Adapts to every situation — shapeshifting for melee, summoning allies, or controlling terrain. The battlefield itself becomes their weapon.";
  else if(cls==="Artificer")combatDesc="Fights with ingenuity — infused weapons, magical gadgets, and constructs. Always has the right tool, because they built it themselves.";
  else combatDesc="A capable combatant who adapts to the situation at hand.";

  // BUILD HTML
  var h='';
  h+='<div class="sheet-page">';
  // HEADER
  h+='<div class="sh-top"><div><div class="sh-name">'+name+'</div>';
  h+='<div class="sh-title">'+race+' '+cls+' — '+sub.name+' <em>('+sub.src+')</em></div></div>';
  h+='<div class="sh-level-badge">Level<span class="lvl">'+level+'</span></div></div>';
  // INFO BAR
  h+='<div class="info-bar">';
  h+='<span class="info-chip">'+align+'</span>';
  h+='<span class="info-chip">'+bg+'</span>';
  h+='<span class="info-chip">'+age+'</span>';
  h+='<span class="info-chip">'+origin.w+' — '+origin.l+'</span>';
  h+='</div>';
  // STATS
  h+='<div class="stats-row">';
  ["STR","DEX","CON","INT","WIS","CHA"].forEach(function(s){
    h+='<div class="stat-box"><div class="stat-name">'+s+'</div><div class="stat-score">'+stats[s]+'</div><div class="stat-mod">'+mod(stats[s])+'</div></div>';
  });
  h+='</div>';
  // COMBAT
  h+='<div class="combat-row">';
  h+='<div class="combat-stat"><div class="cs-label">AC</div><div class="cs-val">'+ac+'</div></div>';
  h+='<div class="combat-stat"><div class="cs-label">HP</div><div class="cs-val">'+hp+'</div></div>';
  h+='<div class="combat-stat"><div class="cs-label">Hit Dice</div><div class="cs-val">'+level+'d'+cd.hd+'</div></div>';
  h+='<div class="combat-stat"><div class="cs-label">Initiative</div><div class="cs-val">'+mod(stats.DEX)+'</div></div>';
  h+='<div class="combat-stat"><div class="cs-label">Speed</div><div class="cs-val">'+speed+' ft</div></div>';
  h+='<div class="combat-stat"><div class="cs-label">Prof. Bonus</div><div class="cs-val">+'+pb+'</div></div>';
  h+='</div>';
  h+='</div>'; // end page 1

  // PAGE 2 — APPEARANCE & EQUIPMENT
  h+='<div class="sheet-page">';
  h+='<div class="sec-h">Physical Appearance</div>';
  h+='<div class="flav"><strong>Build:</strong> '+build+'<br><strong>Skin:</strong> '+skin+'<br><strong>Hair:</strong> '+hair+'<br><strong>Eyes:</strong> '+eyes+'<br><strong>Distinguishing Mark:</strong> '+mark+'</div>';
  h+='<div class="flav"><strong>Clothing:</strong> '+clothing+', made primarily of '+fabric+'.<br><strong>Favorite Color:</strong> '+color+'</div>';

  h+='<div class="sec-h">Equipment</div>';
  h+='<div class="equip-grid">';
  h+='<div class="equip-card"><div class="ec-label">Primary Weapon</div><div class="ec-name">'+weapon.n+'</div><div class="ec-desc">'+weapon.d+'</div></div>';
  h+='<div class="equip-card"><div class="ec-label">Armor</div><div class="ec-name">'+armorPick.n+'</div><div class="ec-desc">'+armorPick.d+'</div></div>';
  if(spellbook){
    h+='<div class="equip-card"><div class="ec-label">Spellbook</div><div class="ec-name">'+spellbook.clasp+'</div><div class="ec-desc">'+spellbook.look+'</div></div>';
    h+='<div class="equip-card"><div class="ec-label">Pages</div><div class="ec-name">Organization</div><div class="ec-desc">'+spellbook.pages+'</div></div>';
  }
  h+='<div class="equip-card"><div class="ec-label">Keepsake</div><div class="ec-name">Trinket</div><div class="ec-desc">'+trinket+'</div></div>';
  h+='</div>'; // end equip grid

  // SUBCLASS
  h+='<div class="sec-h">'+sub.name+' <em style="font-size:.7rem;text-transform:none">('+sub.src+')</em></div>';
  h+='<div class="flav">'+sub.desc+'</div>';

  // COMBAT STYLE
  h+='<div class="flav-block"><div class="fb-title">Combat Style</div>'+combatDesc+'</div>';

  h+='</div>'; // end page 2

  // PAGE 3 — SPELLS (if caster)
  if(spellHTML){
    h+='<div class="sheet-page">';
    h+='<div class="sec-h">Spells</div>';
    h+=spellHTML;
    h+='</div>';
  }

  // PAGE 4 — PERSONALITY & FAITH
  h+='<div class="sheet-page">';
  h+='<div class="sec-h">Personality</div>';
  h+='<div class="pers-grid">';
  h+='<div class="pers-box"><div class="pb-label">Personality Quirk</div><div class="pb-text">'+quirk+'</div></div>';
  h+='<div class="pers-box"><div class="pb-label">Vice</div><div class="pb-text">'+vice+'</div></div>';
  h+='<div class="pers-box"><div class="pb-label">Fear</div><div class="pb-text">'+fear+'</div></div>';
  h+='<div class="pers-box"><div class="pb-label">Voice</div><div class="pb-text">'+voice+'</div></div>';
  h+='<div class="pers-box"><div class="pb-label">Motivation</div><div class="pb-text">'+motivation+'</div></div>';
  h+='<div class="pers-box"><div class="pb-label">Hidden Secret</div><div class="pb-text">'+secret+'</div></div>';
  h+='</div>';

  h+='<div class="sec-h">Faith & Deity</div>';
  if(deity.n.indexOf("None")<0&&deity.n!=="Ancestor Spirits"&&deity.n!=="The Primal Spirits"&&deity.n!=="Patron (Warlock)"){
    h+='<div class="flav"><strong>Deity:</strong> '+deity.n+' — '+deity.desc+'<br><strong>Domain:</strong> '+deity.d+'<br><strong>Holy Symbol:</strong> '+deity.t+'<br><strong>Setting:</strong> '+deity.w+'</div>';
  } else {
    h+='<div class="flav"><strong>Faith:</strong> '+deity.n+' — '+deity.desc+'</div>';
  }

  h+='<div class="sec-h">Backstory Hook</div>';
  var bsHook='Born in '+origin.l+' ('+origin.w+'), '+name+' grew up as a '+bg.toLowerCase()+'. ';
  bsHook+='Driven by '+motivation.toLowerCase()+', they took up the path of the '+cls+'. ';
  bsHook+='Their '+sub.name+' training shaped them into something more than ordinary. ';
  bsHook+='They carry '+trinket.toLowerCase()+' — a reminder of what they left behind. ';
  bsHook+='Beneath the surface, '+secret.toLowerCase()+'. ';
  bsHook+='But what keeps them going is simple: '+motivation.toLowerCase()+'.';
  h+='<div class="backstory">'+bsHook+'</div>';

  h+='</div>'; // end page 4

  var sheet=document.getElementById('sheet');
  sheet.innerHTML=h;
  sheet.classList.add('visible');
  sheet.scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
