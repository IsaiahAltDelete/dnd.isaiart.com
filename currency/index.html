<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Currency Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fef3c7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: linear-gradient(to bottom right, #fffbeb, #fef3c7);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid #fcd34d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            color: #78350f;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-content {
            padding: 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #78350f;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #fcd34d;
            border-radius: 6px;
            font-size: 1rem;
            background: white;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        .conversion-rates {
            background: #fef3c7;
            padding: 16px;
            border-radius: 8px;
            margin-top: 24px;
        }

        .conversion-rates h3 {
            color: #78350f;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .conversion-rates ul {
            list-style: none;
            color: #92400e;
            font-size: 0.875rem;
        }

        .conversion-rates li {
            margin-bottom: 4px;
        }

        .reset-btn {
            background: none;
            border: none;
            color: #92400e;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .coin-icon {
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <svg class="coin-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="8"/>
                    <path d="M9.5 9a2.5 2.5 0 0 1 5 0v6a2.5 2.5 0 0 1-5 0V9z"/>
                </svg>
                D&D Currency Converter
            </div>
            <button class="reset-btn" onclick="resetValues()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
        </div>
        <div class="card-content">
            <div class="input-group">
                <label for="gp">Gold Pieces (GP)</label>
                <input type="number" id="gp" placeholder="Enter GP amount" oninput="convertFromGp(this.value)">
            </div>

            <div class="input-group">
                <label for="sp">Silver Pieces (SP)</label>
                <input type="number" id="sp" placeholder="Enter SP amount" oninput="convertFromSp(this.value)">
            </div>

            <div class="input-group">
                <label for="cp">Copper Pieces (CP)</label>
                <input type="number" id="cp" placeholder="Enter CP amount" oninput="convertFromCp(this.value)">
            </div>

            <div class="input-group">
                <label for="usd">US Dollars (USD)</label>
                <input type="number" id="usd" placeholder="Enter USD amount" oninput="convertFromUsd(this.value)">
            </div>

            <div class="conversion-rates">
                <h3>Conversion Rates:</h3>
                <ul>
                    <li>1 GP = 10 SP = 100 CP = $104 USD</li>
                    <li>1 SP = 10 CP = $10.40 USD</li>
                    <li>1 CP = $1.04 USD</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function convertFromGp(goldAmount) {
            if (!goldAmount || isNaN(goldAmount)) {
                resetValues();
                return;
            }
            const gold = parseInt(goldAmount);
            document.getElementById('cp').value = (gold * 100).toFixed(0);
            document.getElementById('sp').value = (gold * 10).toFixed(1);
            document.getElementById('usd').value = (gold * 104).toFixed(2);
        }

        function convertFromSp(silverAmount) {
            if (!silverAmount || isNaN(silverAmount)) {
                resetValues();
                return;
            }
            const silver = parseInt(silverAmount);
            document.getElementById('cp').value = (silver * 10).toFixed(0);
            document.getElementById('gp').value = (silver / 10).toFixed(1);
            document.getElementById('usd').value = (silver * 10.40).toFixed(2);
        }

        function convertFromCp(copperAmount) {
            if (!copperAmount || isNaN(copperAmount)) {
                resetValues();
                return;
            }
            const copper = parseInt(copperAmount);
            document.getElementById('sp').value = (copper / 10).toFixed(1);
            document.getElementById('gp').value = (copper / 100).toFixed(1);
            document.getElementById('usd').value = (copper * 1.04).toFixed(2);
        }

        function convertFromUsd(usdAmount) {
            if (!usdAmount || isNaN(usdAmount)) {
                resetValues();
                return;
            }
            const dollars = parseFloat(usdAmount);
            document.getElementById('gp').value = (dollars / 104).toFixed(2);
            document.getElementById('sp').value = (dollars / 10.40).toFixed(1);
            document.getElementById('cp').value = (dollars / 1.04).toFixed(0);
        }

        function resetValues() {
            document.getElementById('cp').value = '';
            document.getElementById('sp').value = '';
            document.getElementById('gp').value = '';
            document.getElementById('usd').value = '';
        }
    </script>
</body>
</html>
