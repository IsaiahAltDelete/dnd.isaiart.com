<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e 2024 Handbook Directory</title>
    <style>
        /* Reset and base styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fff;
            color: #000;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        .link-button {
            display: block;
            width: 100%;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .link-button:hover {
            background-color: #000;
            color: #fff;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .link-button {
                padding: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>D&D 5e 2024 Handbook Directory</h1>
        <a href="DND_5e_Rulebook_Part_1.pdf" target="_blank" class="link-button">Part 1: Player's Introduction</a>
        <a href="DND_5e_Rulebook_Part_2.pdf" target="_blank" class="link-button">Part 2: Character Creation</a>
        <a href="DND_5e_Rulebook_Part_3.pdf" target="_blank" class="link-button">Part 3: Classes & Abilities</a>
        <a href="DND_5e_Rulebook_Part_4.pdf" target="_blank" class="link-button">Part 4: Equipment & Tools</a>
        <a href="DND_5e_Rulebook_Part_5.pdf" target="_blank" class="link-button">Part 5: Spells & Magic</a>
    </div>
</body>
</html>
