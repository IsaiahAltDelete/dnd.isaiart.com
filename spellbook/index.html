<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Spellbook Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <!-- Combined Navigation and Rest Buttons Section -->
        <section class="header-section">
            <!-- Hamburger Menu for Mobile -->
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>

            <!-- Desktop Navigation -->
            <nav class="nav">
                <button class="nav-btn active" data-tab="character-sheet">
                    <i class="fas fa-user"></i>
                    <span>Character Sheet</span>
                </button>
                <button class="nav-btn" data-tab="spellbook">
                    <i class="fas fa-book-open"></i>
                    <span>Spellbook</span>
                </button>
                <button class="nav-btn" data-tab="slots">
                    <i class="fas fa-scroll"></i>
                    <span>Spell Slots</span>
                </button>
                <button class="nav-btn" data-tab="dice-roller">
                    <i class="fas fa-dice-d20"></i>
                    <span>Dice Roller</span>
                </button>
            </nav>

            <!-- Mobile Navigation Menu -->
            <nav class="mobile-nav" id="mobile-nav">
                <button class="nav-btn active" data-tab="character-sheet">
                    <i class="fas fa-user"></i>
                    <span>Character Sheet</span>
                </button>
                <button class="nav-btn" data-tab="spellbook">
                    <i class="fas fa-book-open"></i>
                    <span>Spellbook</span>
                </button>
                <button class="nav-btn" data-tab="slots">
                    <i class="fas fa-scroll"></i>
                    <span>Spell Slots</span>
                </button>
                <button class="nav-btn" data-tab="dice-roller">
                    <i class="fas fa-dice-d20"></i>
                    <span>Dice Roller</span>
                </button>
            </nav>

            <!-- Rest Buttons -->
            <div class="rest-buttons">
                <button class="rest-btn" data-rest="long">
                    <i class="fas fa-bed"></i>
                    <span>Long Rest</span>
                </button>
            </div>
        </section>

        <!-- Character Sheet Tab -->
        <div id="character-sheet" class="content active">
            <div class="card glass">
                <div class="section-title">
                    <i class="fas fa-user"></i>
                    <span>Character Sheet</span>
                </div>

                <!-- Character Name -->
                <div class="sub-section">
                    <h3><i class="fas fa-id-card"></i> Character Name</h3>
                    <input type="text" id="character-name" placeholder="Enter character name...">
                </div>

                <!-- Levels -->
                <div class="sub-section">
                    <h3><i class="fas fa-level-up-alt"></i> Levels</h3>
                    <div class="levels">
                        <div class="level">
                            <label for="level"><i class="fas fa-trophy"></i> Level</label>
                            <input type="number" id="level" value="1" min="1">
                        </div>
                        <div class="level">
                            <label for="experience"><i class="fas fa-medal"></i> Experience</label>
                            <input type="number" id="experience" value="0" min="0">
                        </div>
                    </div>
                </div>

                <!-- Race & Class -->
                <div class="sub-section">
                    <h3><i class="fas fa-dragon"></i> Race & Class</h3>
                    <div class="race-class">
                        <div class="race">
                            <label for="race"><i class="fas fa-paw"></i> Race</label>
                            <input type="text" id="race" placeholder="e.g., Elf">
                        </div>
                        <div class="class">
                            <label for="class"><i class="fas fa-crown"></i> Class</label>
                            <input type="text" id="class" placeholder="e.g., Wizard">
                        </div>
                    </div>
                </div>

                <!-- Ability Scores -->
                <div class="sub-section">
                    <h3><i class="fas fa-brain"></i> Ability Scores</h3>
                    <div class="ability-scores">
                        <div class="ability">
                            <label for="strength"><i class="fas fa-dumbbell"></i> Strength <span class="modifier" id="strength-mod">(+0)</span></label>
                            <input type="number" id="strength" value="10" min="1">
                        </div>
                        <div class="ability">
                            <label for="dexterity"><i class="fas fa-running"></i> Dexterity <span class="modifier" id="dexterity-mod">(+0)</span></label>
                            <input type="number" id="dexterity" value="10" min="1">
                        </div>
                        <div class="ability">
                            <label for="constitution"><i class="fas fa-heartbeat"></i> Constitution <span class="modifier" id="constitution-mod">(+0)</span></label>
                            <input type="number" id="constitution" value="10" min="1">
                        </div>
                        <div class="ability">
                            <label for="intelligence"><i class="fas fa-flask"></i> Intelligence <span class="modifier" id="intelligence-mod">(+0)</span></label>
                            <input type="number" id="intelligence" value="10" min="1">
                        </div>
                        <div class="ability">
                            <label for="wisdom"><i class="fas fa-eye"></i> Wisdom <span class="modifier" id="wisdom-mod">(+0)</span></label>
                            <input type="number" id="wisdom" value="10" min="1">
                        </div>
                        <div class="ability">
                            <label for="charisma"><i class="fas fa-theater-masks"></i> Charisma <span class="modifier" id="charisma-mod">(+0)</span></label>
                            <input type="number" id="charisma" value="10" min="1">
                        </div>
                    </div>
                </div>

                <!-- Proficiencies -->
                <div class="sub-section">
                    <h3><i class="fas fa-tools"></i> Proficiencies</h3>
                    <div class="proficiencies">
                        <label class="proficiency">
                            <input type="checkbox" id="arcana">
                            <span class="custom-checkbox"></span>
                            <span class="proficiency-label">Arcana</span>
                        </label>
                        <label class="proficiency">
                            <input type="checkbox" id="history">
                            <span class="custom-checkbox"></span>
                            <span class="proficiency-label">History</span>
                        </label>
                        <label class="proficiency">
                            <input type="checkbox" id="insight">
                            <span class="custom-checkbox"></span>
                            <span class="proficiency-label">Insight</span>
                        </label>
                        <label class="proficiency">
                            <input type="checkbox" id="athletics">
                            <span class="custom-checkbox"></span>
                            <span class="proficiency-label">Athletics</span>
                        </label>
                        <label class="proficiency">
                            <input type="checkbox" id="acrobatics">
                            <span class="custom-checkbox"></span>
                            <span class="proficiency-label">Acrobatics</span>
                        </label>
                        <!-- Add more proficiencies as needed following the same structure -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Spellbook Tab -->
        <div id="spellbook" class="content">
            <div class="card glass">
                <div class="section-title">
                    <i class="fas fa-book-open"></i>
                    <span>Spellbook</span>
                </div>
                
                <!-- Add Spell Form -->
                <div class="spell-form">
                    <input type="text" class="spell-input" id="spell-name" placeholder="New spell name">
                    <select class="spell-select" id="spell-level">
                        <option value="0">Cantrip</option>
                        <option value="1">Level 1</option>
                        <option value="2">Level 2</option>
                        <option value="3">Level 3</option>
                        <option value="4">Level 4</option>
                        <option value="5">Level 5</option>
                        <option value="6">Level 6</option>
                        <option value="7">Level 7</option>
                        <option value="8">Level 8</option>
                        <option value="9">Level 9</option>
                    </select>
                    <button class="spell-btn" id="add-spell">
                        <i class="fas fa-plus"></i>
                        <span>Add</span>
                    </button>
                </div>

                <!-- Cantrips Section -->
                <div class="section-title">
                    <i class="fas fa-snowflake"></i>
                    <span>Cantrips</span>
                </div>
                <div id="cantrips-container"></div>

                <!-- Spells Section -->
                <div class="section-title">
                    <i class="fas fa-fire"></i>
                    <span>Spells</span>
                </div>
                <div id="spells-container"></div>
            </div>
        </div>

        <!-- Spell Slots Tab -->
        <div id="slots" class="content">
            <div class="card glass">
                <div class="section-title">
                    <i class="fas fa-star"></i>
                    <span>Spell Slots</span>
                </div>
                <div id="spell-slots-container"></div>
            </div>
        </div>

        <!-- Dice Roller Tab -->
        <div id="dice-roller" class="content">
            <div class="card glass">
                <div class="section-title">
                    <i class="fas fa-dice-d20"></i>
                    <span>Dice Roller</span>
                </div>

                <div class="dice-form">
                    <div class="dice-input">
                        <label for="dice-count"><i class="fas fa-dice-six"></i> Number of Dice:</label>
                        <input type="number" id="dice-count" min="1" value="1">
                    </div>
                    <div class="dice-input">
                        <label for="dice-type"><i class="fas fa-dice"></i> Type of Dice:</label>
                        <select id="dice-type">
                            <option value="4">d4</option>
                            <option value="6">d6</option>
                            <option value="8">d8</option>
                            <option value="10">d10</option>
                            <option value="12">d12</option>
                            <option value="20">d20</option>
                            <option value="100">d100</option>
                        </select>
                    </div>
                    <button class="spell-btn" id="roll-dice">
                        <i class="fas fa-play"></i>
                        <span>Roll</span>
                    </button>
                </div>

                <!-- Dice Roll History Section -->
                <div class="section-title">
                    <i class="fas fa-history"></i>
                    <span>Roll History</span>
                </div>
                <div id="roll-history" class="roll-history">
                    <!-- Last 5 rolls will be displayed here -->
                </div>

                <div id="dice-results" class="dice-results">
                    <!-- Dice results will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Particle.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
